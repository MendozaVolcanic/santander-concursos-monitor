name: Monitor Concursos Santander

# Corre todos los dias a las 13:00 UTC (~09:00 hora Chile) y permite
# dispararlo a mano desde la pestaña Actions.
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

# Necesario para que el job pueda commitear el estado y el dashboard.
permissions:
  contents: write

# Evita corridas solapadas.
concurrency:
  group: monitor-concursos
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Chromium completo + librerias del sistema (incluye xvfb via --with-deps)
          python -m playwright install --with-deps chromium

      - name: Ejecutar monitor (headed bajo display virtual)
        # El sitio bloquea Chromium headless (Akamai 403). xvfb-run da una
        # pantalla virtual para correr Chromium en modo headed en el runner.
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: xvfb-run -a python monitor.py

      - name: Commit estado + dashboard si cambiaron
        run: |
          git config user.name  "concursos-bot"
          git config user.email "actions@github.com"
          git add data/concursos.json docs/index.html
          if git diff --staged --quiet; then
            echo "Sin cambios que commitear."
          else
            git commit -m "chore: actualizar concursos y dashboard ($(date -u +%Y-%m-%d))"
            git push
          fi
